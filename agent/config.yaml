device:
  id: "rpi-001"
  hardware_id: "raspberrypi"
  current_version: "0.0.0"

mqtt:
  broker_host: "localhost"
  broker_port: 1883
  keepalive: 60
  reconnect_delay_min: 1
  reconnect_delay_max: 60
  qos: 1

minio:
  base_url: "http://localhost:9000"
  bucket: "updates"

security:
  # Path to RSA-4096 public key (PEM format, SubjectPublicKeyInfo)
  # Generated by: infrastructure/scripts/generate-keys.sh
  public_key_path: "../infrastructure/scripts/keys/swupdate-pub.pem"

agent:
  download_dir: "/tmp/ota-downloads"
  max_retries: 3
  retry_delay_seconds: 5
  download_chunk_size_bytes: 65536
  heartbeat_interval_seconds: 30
  # Set to false on Raspberry Pi to perform a REAL partition write + reboot
  # Requires agent to run as root: sudo python3 agent.py
  simulation_mode: 

  install_strategy: "stream_to_partition"

logging:
  level: "INFO"
  # log_file: "/var/log/ota-agent.log"  # Uncomment to also log to file
